<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIDU-LATS - 报告审核员入口</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji'; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.login-box { background: white; padding: 40px; border-radius: 4px; box-shadow: 0 1px 0 rgba(0,0,0,0.03); width: 420px; }
.login-logo { text-align: center; margin-bottom: 28px; }
.login-logo h1 { color: #1677ff; font-size: 26px; margin-bottom: 6px; }
.login-logo p { color: rgba(0,0,0,0.65); font-size: 14px; }
.role-badge { display: inline-block; background: #e6f4ff; color: #0958d9; border: 1px solid #91caff; padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-top: 10px; }
.demo-hint { background: #e6f4ff; border: 1px solid #91caff; color: #0958d9; padding: 10px 12px; border-radius: 6px; font-size: 12px; margin-bottom: 16px; line-height: 1.6; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; margin-bottom: 6px; color: rgba(0,0,0,0.88); font-weight: 500; font-size: 14px; }
.form-group input { width: 100%; padding: 10px 12px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; outline: none; }
.form-group input:focus { border-color: #1677ff; }
.btn-login { width: 100%; background: #1677ff; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 15px; cursor: pointer; font-weight: 600; }
.role-cards { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
.role-card { display: flex; align-items: center; gap: 12px; padding: 12px; border: 1px solid #f0f0f0; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
.role-card:hover { border-color: #1677ff; background: #e6f4ff; }
.role-card .info .name { font-weight: 600; font-size: 14px; color: rgba(0,0,0,0.88); }
.role-card .info .desc { font-size: 12px; color: rgba(0,0,0,0.45); margin-top: 2px; }
.footer { text-align: center; margin-top: 20px; font-size: 12px; color: rgba(0,0,0,0.45); }
</style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">
    <h1>SIDU-LATS</h1>
    <p>缺陷识别数据存管系统</p>
    <div class="role-badge"> 报告审核员角色演示</div>
  </div>
  <div class="demo-hint">
     报告审核员（Reviewer）<br>
    权限范围：报告复核、电子签名（初审/复核/批准/驳回）、禁止账号管理与系统底层配置
  </div>
  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group"><label>用户名</label><input type="text" id="username" value="wangfang" placeholder="请输入用户名" required></div>
    <div class="form-group"><label>密码</label><input type="password" id="password" value="revw1234" placeholder="请输入密码" required></div>
    <button type="submit" class="btn-login">以报告审核员身份登录</button>
  </form>
  <div class="role-cards">
    <div class="role-card" onclick="location.href='../admin/login.html'"><div class="info"><div class="name">切换：系统管理员</div><div class="desc">用户管理、系统配置、WORM存储、日志导出</div></div></div>
    <div class="role-card" onclick="location.href='../operator/login.html'"><div class="info"><div class="name">切换：操作员</div><div class="desc">NTA数据上传、基础数据录入、自有数据查询</div></div></div>
    <div class="role-card" onclick="location.href='../auditor/login.html'"><div class="info"><div class="name">切换：QA审计员</div><div class="desc">审计日志校验、哈希核验、介质抽检、权限复审</div></div></div>
  </div>
  <div class="footer">© 2026 SIDU · FDA 21 CFR Part 11 · ALCOA+</div>
</div>
<script>
function handleLogin(e) {
  e.preventDefault();
  var u = document.getElementById('username').value.trim();
  var p = document.getElementById('password').value;
  if (!u || p.length < 4) { alert('请输入用户名和密码（至少4位）'); return; }
  sessionStorage.setItem('lats_logged_in', 'true');
  sessionStorage.setItem('lats_user', u);
  sessionStorage.setItem('lats_role', 'reviewer');
  sessionStorage.setItem('lats_role_name', '报告审核员');
  location.href = 'dashboard.html';
}
</script>
</body>
</html>
