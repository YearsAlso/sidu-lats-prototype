<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIDU-LATS - 审计员仪表盘</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif,'Apple Color Emoji','Segoe UI Emoji';background:#f5f5f5;}
.header{background:white;padding:0 24px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,0.06);position:fixed;width:100%;top:0;z-index:1000;height:64px;}
.header-left{display:flex;align-items:center;gap:20px;}
.logo{font-size:20px;font-weight:600;color:#1677ff;}
.role-tag{background:#f6ffed;color:#389e0d;border:1px solid #b7eb8f;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600;}
.breadcrumb{color:rgba(0,0,0,0.65);font-size:14px;}
.header-right{display:flex;align-items:center;gap:16px;}
.layout-sider{position:fixed;left:0;top:64px;bottom:0;width:220px;background:white;box-shadow:2px 0 8px rgba(0,0,0,0.03);z-index:999;overflow-y:auto;}
.menu-item{padding:14px 24px;cursor:pointer;display:flex;align-items:center;gap:12px;color:rgba(0,0,0,0.88);transition:all 0.2s;border-left:3px solid transparent;font-size:14px;}
.menu-item:hover{background:#e6f4ff;color:#1677ff;}
.menu-item.active{background:#e6f4ff;color:#1677ff;border-left-color:#1677ff;font-weight:500;}
.main-content{margin-left:220px;margin-top:64px;padding:24px;}
.page-title{font-size:24px;font-weight:600;color:rgba(0,0,0,0.88);margin-bottom:24px;}
.page-title span{font-size:14px;color:rgba(0,0,0,0.45);font-weight:400;margin-left:12px;}
.stat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:24px;}
.stat-card{background:white;border-radius:8px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,0.03);}
.stat-card .num{font-size:28px;font-weight:600;color:rgba(0,0,0,0.88);}
.stat-card .lbl{font-size:13px;color:rgba(0,0,0,0.45);margin-top:4px;}
.stat-card .sub{font-size:11px;margin-top:4px;}
.card{background:white;border-radius:8px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,0.03);margin-bottom:24px;}
.card-title{font-size:16px;font-weight:500;color:rgba(0,0,0,0.88);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center;}
.btn-primary{background:#52c41a;color:white;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;font-size:14px;}
.btn-outline{background:white;border:1px solid #d9d9d9;padding:8px 16px;border-radius:4px;cursor:pointer;font-size:14px;color:rgba(0,0,0,0.65);}
.tag{padding:2px 8px;border-radius:4px;font-size:12px;}
.tag-success{background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f;}
.tag-warning{background:#fffbe6;color:#faad14;border:1px solid #ffe58f;}
.tag-info{background:#e6f4ff;color:#1677ff;border:1px solid #91caff;}
.hash-val{font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;font-size:12px;background:#fafafa;padding:2px 6px;border-radius:2px;color:rgba(0,0,0,0.65);}
table{width:100%;border-collapse:collapse;}
thead tr{background:#fafafa;border-bottom:1px solid #f0f0f0;}
th{padding:12px;text-align:left;font-weight:500;color:rgba(0,0,0,0.88);font-size:14px;}
td{padding:12px;font-size:13px;color:rgba(0,0,0,0.88);border-bottom:1px solid #fafafa;}
.timeline-item{padding:12px 0;border-bottom:1px dashed #f0f0f0;font-size:14px;}
.timeline-item:last-child{border-bottom:none;}
.timeline-item .time{color:rgba(0,0,0,0.45);font-size:12px;margin-bottom:4px;}
.verify-panel{background:#f6ffed;border:1px solid #b7eb8f;border-radius:8px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;font-size:14px;}
.verify-panel .result{color:#52c41a;font-weight:500;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
.quick-actions{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.quick-item{display:flex;align-items:center;gap:12px;padding:14px;background:#fafafa;border-radius:8px;cursor:pointer;transition:all 0.2s;border:1px solid transparent;}
.quick-item:hover{background:#f6ffed;border-color:#b7eb8f;}
.quick-item .icon{font-size:22px;}
.quick-item .label{font-weight:500;font-size:13px;color:rgba(0,0,0,0.88);}
.quick-item .sub{font-size:11px;color:rgba(0,0,0,0.45);margin-top:2px;}
/* 用户下拉菜单 */
.user-trigger{display:flex;align-items:center;gap:6px;cursor:pointer;padding:6px 12px;border-radius:4px;transition:background 0.15s;position:relative;user-select:none;}
.user-trigger:hover{background:#fafafa;}
.user-trigger .arrow{font-size:10px;color:rgba(0,0,0,0.45);transition:transform 0.2s;}
.user-trigger.open .arrow{transform:rotate(180deg);}
.user-dropdown{position:absolute;top:56px;right:24px;background:white;border-radius:8px;box-shadow:0 6px 16px 0 rgba(0,0,0,0.08),0 3px 6px -4px rgba(0,0,0,0.12),0 9px 28px 8px rgba(0,0,0,0.05);min-width:160px;z-index:2001;padding:4px 0;}
.dropdown-item{padding:10px 16px;cursor:pointer;font-size:14px;color:rgba(0,0,0,0.88);transition:background 0.15s;}
.dropdown-item:hover{background:#fafafa;}
.dropdown-divider{height:1px;background:#f0f0f0;margin:4px 0;}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);display:none;align-items:center;justify-content:center;z-index:2000;}
.modal-box{background:white;border-radius:8px;width:540px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;}
.modal-header{padding:20px 24px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center;}
.modal-header h3{margin:0;font-size:16px;font-weight:500;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:rgba(0,0,0,0.45);line-height:1;}
.modal-tabs{display:flex;border-bottom:1px solid #f0f0f0;padding:0 24px;}
.modal-tab{padding:12px 16px;cursor:pointer;font-size:14px;color:rgba(0,0,0,0.65);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s;}
.modal-tab:hover{color:#1677ff;}
.modal-tab.active{color:#1677ff;border-bottom-color:#1677ff;font-weight:500;}
.modal-body{padding:24px;overflow-y:auto;flex:1;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.profile-avatar{width:64px;height:64px;border-radius:50%;background:#f6ffed;color:#389e0d;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:600;margin:0 auto 16px;}
.oplog-item{padding:12px 0;border-bottom:1px solid #fafafa;display:flex;justify-content:space-between;align-items:center;}
.oplog-item:last-child{border-bottom:none;}
.oplog-time{font-size:12px;color:rgba(0,0,0,0.45);}
.oplog-action{font-size:13px;color:rgba(0,0,0,0.88);flex:1;margin:0 16px;}
.oplog-ip{font-size:12px;color:rgba(0,0,0,0.45);font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,Courier,monospace;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;margin-bottom:8px;color:rgba(0,0,0,0.88);font-weight:500;font-size:14px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:14px;outline:none;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#1677ff;box-shadow:0 0 0 2px rgba(22,119,255,0.1);}
.form-group .hint{font-size:12px;color:rgba(0,0,0,0.45);margin-top:4px;}
.btn-default{background:white;border:1px solid #d9d9d9;padding:8px 16px;border-radius:4px;cursor:pointer;font-size:14px;color:rgba(0,0,0,0.65);}
.msg-success{background:#f6ffed;border:1px solid #b7eb8f;color:#389e0d;padding:10px 12px;border-radius:6px;font-size:13px;margin-bottom:16px;display:none;}
.msg-error{background:#fff2f0;border:1px solid #ffccc7;color:#ff4d4f;padding:10px 12px;border-radius:6px;font-size:13px;margin-bottom:16px;display:none;}
.info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #fafafa;font-size:14px;}
.info-row:last-child{border-bottom:none;}
.info-row .key{color:rgba(0,0,0,0.45);}
.info-row .val{color:rgba(0,0,0,0.88);font-weight:500;}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="logo">SIDU-LATS</div>
    <div class="role-tag">审计员</div>
    <div class="breadcrumb">仪表盘 &raquo; 审计概览</div>
  </div>
  <div class="header-right">
    <div class="user-trigger" id="userTrigger" onclick="toggleUserMenu(event)">
      <span style="color:rgba(0,0,0,0.65);font-size:14px;">当前用户 / 王芳</span>
      <span class="arrow">▼</span>
    </div>
  </div>
</div>

<!-- 用户下拉菜单 -->
<div class="user-dropdown" id="userDropdown" style="display:none;">
  <div class="dropdown-item" onclick="openUserCenter('profile')">个人信息</div>
  <div class="dropdown-item" onclick="openUserCenter('password')">修改密码</div>
  <div class="dropdown-item" onclick="openUserCenter('logs')">操作日志</div>
  <div class="dropdown-divider"></div>
  <div class="dropdown-item" onclick="location.href='login.html'" style="color:#ff4d4f;">注销</div>
</div>

<!-- 用户中心 Modal -->
<div class="modal-overlay" id="userCenterModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3>用户中心</h3>
      <button class="modal-close" onclick="closeUserCenter()">&times;</button>
    </div>
    <div class="modal-tabs">
      <div class="modal-tab active" data-tab="profile" onclick="switchUserTab('profile')">个人信息</div>
      <div class="modal-tab" data-tab="password" onclick="switchUserTab('password')">修改密码</div>
      <div class="modal-tab" data-tab="logs" onclick="switchUserTab('logs')">操作日志</div>
    </div>
    <div class="modal-body">
      <div class="tab-panel active" id="panelProfile">
        <div class="profile-avatar">王</div>
        <div style="text-align:center;font-size:18px;font-weight:600;color:rgba(0,0,0,0.88);margin-bottom:4px;">王芳</div>
        <div style="text-align:center;font-size:13px;color:rgba(0,0,0,0.45);margin-bottom:24px;">QA 审计员</div>
        <div class="msg-success" id="profileSuccess" style="margin-bottom:16px;">个人信息已更新</div>
        <div class="info-row"><span class="key">用户名</span><span class="val">wangfang</span></div>
        <div class="info-row"><span class="key">角色</span><span class="val">QA 审计员（二级）</span></div>
        <div class="info-row"><span class="key">权限范围</span><span class="val">日志审查 + 哈希链验证 + 合规导出</span></div>
        <div class="info-row" id="rowEmailR"><span class="key">邮箱</span><span class="val" id="valEmail">wangfang@company.com</span></div>
        <div class="info-row"><span class="key">最后登录</span><span class="val">2026-07-02 09:00:00</span></div>
        <div class="info-row"><span class="key">登录 IP</span><span class="val" style="font-family:'SFMono-Regular',Consolas,monospace;">192.168.1.80</span></div>
        <div class="info-row"><span class="key">账户状态</span><span class="val" style="color:#52c41a;">启用中</span></div>
        <div style="text-align:right;margin-top:16px;">
          <button class="btn-default" style="padding:6px 16px;" onclick="editProfile()">编辑个人信息</button>
        </div>
        <div id="profileEditForm" style="display:none;margin-top:16px;padding-top:16px;border-top:1px solid #f0f0f0;">
          <div class="form-group"><label>邮箱</label><input type="email" id="editEmail" value="wangfang@company.com"></div>
          <div style="display:flex;gap:12px;justify-content:flex-end;">
            <button class="btn-default" style="padding:6px 16px;" onclick="cancelEditProfile()">取消</button>
            <button class="btn-primary" style="padding:6px 20px;" onclick="saveProfile()">保存</button>
          </div>
        </div>
      </div>
