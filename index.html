<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIDU-LATS - 登录</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); width: 400px; }
.login-logo { text-align: center; margin-bottom: 32px; }
.login-logo h1 { color: #1890ff; font-size: 28px; margin-bottom: 8px; font-weight: 600; }
.login-logo p { color: #666; font-size: 14px; }
.fda-badge { background: #fff7e6; color: #d46b08; padding: 4px 12px; border-radius: 4px; font-size: 12px; display: inline-block; margin-top: 8px; border: 1px solid #ffd591; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; font-size: 14px; }
.form-group input { width: 100%; padding: 10px 12px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; outline: none; transition: border-color 0.2s; }
.form-group input:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,0.1); }
.btn-login { width: 100%; background: #1890ff; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: 500; transition: background 0.2s; }
.btn-login:hover { background: #40a9ff; }
.btn-login:active { background: #096dd9; }
.footer-note { text-align: center; margin-top: 20px; font-size: 12px; color: #999; }
.error-msg { background: #fff2f0; border: 1px solid #ffccc7; color: #ff4d4f; padding: 10px 12px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; display: none; }
.demo-hint { background: #f6ffed; border: 1px solid #b7eb8f; color: #52c41a; padding: 10px 12px; border-radius: 6px; font-size: 12px; margin-bottom: 16px; line-height: 1.6; }
</style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">
    <h1>SIDU-LATS</h1>
    <p>缺陷识别数据存管系统 · 合规版</p>
    <span class="fda-badge">FDA 21 CFR Part 11</span>
  </div>

  <div class="demo-hint">
    💡 演示说明：任意用户名 + 任意密码（≥4位）即可登录
  </div>

  <div id="errorMsg" class="error-msg">用户名或密码错误，请重试</div>

  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login">登录</button>
  </form>

  <div class="footer-note">
    © 2026 SIDU · 仅限授权人员访问 · ALCOA+ 合规
  </div>
</div>

<script>
function handleLogin(e) {
  e.preventDefault();
  var username = document.getElementById('username').value.trim();
  var password = document.getElementById('password').value;
  var errorMsg = document.getElementById('errorMsg');

  if (!username) {
    errorMsg.textContent = '请输入用户名';
    errorMsg.style.display = 'block';
    return;
  }
  if (password.length < 4) {
    errorMsg.textContent = '密码长度至少4位';
    errorMsg.style.display = 'block';
    return;
  }

  errorMsg.style.display = 'none';
  sessionStorage.setItem('lats_logged_in', 'true');
  sessionStorage.setItem('lats_user', username);
  location.href = 'pages/dashboard.html';
}
</script>
</body>
</html>
