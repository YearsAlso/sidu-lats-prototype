<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIDU-LATS - 登录</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif; background: #f4f5f7; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.login-box { background: white; padding: 40px; border-radius: 4px; box-shadow: 0 1px 0 rgba(15,23,42,0.04); width: 400px; }
.login-logo { text-align: center; margin-bottom: 32px; }
.login-logo h1 { color: #1f3a5f; font-size: 28px; margin-bottom: 8px; font-weight: 600; }
.login-logo p { color: #5a6373; font-size: 14px; }
.fda-badge { background: #faf2e0; color: #a36404; padding: 4px 12px; border-radius: 4px; font-size: 12px; display: inline-block; margin-top: 8px; border: 1px solid #e6c890; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; margin-bottom: 8px; color: #1f2937; font-weight: 500; font-size: 14px; }
.form-group input { width: 100%; padding: 10px 12px; border: 1px solid #d0d4dc; border-radius: 6px; font-size: 14px; outline: none; transition: border-color 0.2s; }
.form-group input:focus { border-color: #1f3a5f; box-shadow: 0 0 0 2px rgba(31,58,95,0.1); }
.btn-login { width: 100%; background: #1f3a5f; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: 500; transition: background 0.2s; }
.btn-login:hover { background: #2d5483; }
.btn-login:active { background: #15293f; }
.footer-note { text-align: center; margin-top: 20px; font-size: 12px; color: #8a93a3; }
.error-msg { background: #f7e7e5; border: 1px solid #d9a8a3; color: #b3261e; padding: 10px 12px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; display: none; }
</style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">
    <h1>SIDU-LATS</h1>
    <p>缺陷识别数据存管系统</p>
    <span class="fda-badge">FDA 21 CFR Part 11</span>
  </div>

  <div id="errorMsg" class="error-msg">用户名或密码错误，请重试</div>

  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login">登录</button>
  </form>

  <div class="footer-note">
    © 2026 SIDU · 仅限授权人员访问 · ALCOA+ 合规
  </div>
</div>

<script>
function handleLogin(e) {
  e.preventDefault();
  var username = document.getElementById('username').value.trim();
  var password = document.getElementById('password').value;
  var errorMsg = document.getElementById('errorMsg');

  if (!username) {
    errorMsg.textContent = '请输入用户名';
    errorMsg.style.display = 'block';
    return;
  }
  if (password.length < 4) {
    errorMsg.textContent = '密码长度至少4位';
    errorMsg.style.display = 'block';
    return;
  }

  errorMsg.style.display = 'none';
  sessionStorage.setItem('lats_logged_in', 'true');
  sessionStorage.setItem('lats_user', username);
  location.href = 'pages/dashboard.html';
}
</script>
</body>
</html>
