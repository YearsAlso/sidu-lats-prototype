<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIDU-LATS - 审计员入口</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif; background: #f4f5f7; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.login-box { background: white; padding: 40px; border-radius: 4px; box-shadow: 0 1px 0 rgba(15,23,42,0.04); width: 420px; }
.login-logo { text-align: center; margin-bottom: 28px; }
.login-logo h1 { color: #1f3a5f; font-size: 26px; margin-bottom: 6px; }
.login-logo p { color: #666; font-size: 14px; }
.role-badge { display: inline-block; background: #e8f3ec; color: #389e0d; border: 1px solid #9bccaf; padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-top: 10px; }
.demo-hint { background: #e8f3ec; border: 1px solid #9bccaf; color: #389e0d; padding: 10px 12px; border-radius: 6px; font-size: 12px; margin-bottom: 16px; line-height: 1.6; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; margin-bottom: 6px; color: #333; font-weight: 500; font-size: 14px; }
.form-group input { width: 100%; padding: 10px 12px; border: 1px solid #d0d4dc; border-radius: 6px; font-size: 14px; outline: none; }
.btn-login { width: 100%; background: #389e0d; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 15px; cursor: pointer; font-weight: 600; }
.role-cards { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
.role-card { display: flex; align-items: center; gap: 12px; padding: 12px; border: 1px solid #e8eaed; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
.role-card:hover { border-color: #0f7b3a; background: #e8f3ec; }
.role-card .icon { font-size: 22px; }
.role-card .info .name { font-weight: 600; font-size: 14px; color: #333; }
.role-card .info .desc { font-size: 12px; color: #888; margin-top: 2px; }
.footer { text-align: center; margin-top: 20px; font-size: 12px; color: #999; }
</style>
</head>
<body>
<div class="login-box">
  <div class="login-logo"><h1>SIDU-LATS</h1><p>缺陷识别数据存管系统 · 合规版</p><div class="role-badge"> QA审计员角色演示</div></div>
  <div class="demo-hint"> QA审计员（QA Auditor）<br>权限：审计日志审查、哈希链验证、报告审核、签名授权申请、数据导出审批。</div>
  <form onsubmit="handleLogin(event)">
    <div class="form-group"><label>用户名</label><input type="text" id="username" value="wangfang"></div>
    <div class="form-group"><label>密码</label><input type="password" id="password" value="audit1234"></div>
    <button type="submit" class="btn-login">以审计员身份登录</button>
  </form>
  <div class="role-cards">
    <div class="role-card" onclick="location.href='admin-login.html'"><div class="icon"></div><div class="info"><div class="name">切换：管理员</div><div class="desc">全权限</div></div></div>
    <div class="role-card" onclick="location.href='operator-login.html'"><div class="icon"></div><div class="info"><div class="name">切换：操作员</div><div class="desc">检测操作</div></div></div>
    <div class="role-card" onclick="location.href='viewer-login.html'"><div class="icon">️</div><div class="info"><div class="name">切换：查看者</div><div class="desc">只读</div></div></div>
  </div>
  <div class="footer">© 2026 SIDU · FDA 21 CFR Part 11 · ALCOA+</div>
</div>
<script>
function handleLogin(e) {
  e.preventDefault();
  sessionStorage.setItem('lats_logged_in','true');
  sessionStorage.setItem('lats_user',document.getElementById('username').value);
  sessionStorage.setItem('lats_role','auditor');
  sessionStorage.setItem('lats_role_name','审计员');
  location.href='auditor-dashboard.html';
}
</script>
</body>
</html>
