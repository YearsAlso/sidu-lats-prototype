<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIDU-LATS - 查看者入口</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',system-ui,sans-serif;background:#f4f5f7;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-box{background:white;padding:40px;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.2);width:420px;}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo h1{color:#1f3a5f;font-size:26px;margin-bottom:6px;}
.login-logo p{color:#5a6373;font-size:14px;}
.role-badge{display:inline-block;background:#f0f2f5;color:#595959;border:1px solid #d0d4dc;padding:5px 14px;border-radius:20px;font-size:13px;font-weight:600;margin-top:10px;}
.demo-hint{background:#fbfbfc;border:1px solid #d0d4dc;color:#595959;padding:10px 12px;border-radius:6px;font-size:12px;margin-bottom:16px;line-height:1.6;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;margin-bottom:6px;color:#333;font-weight:500;font-size:14px;}
.form-group input{width:100%;padding:10px 12px;border:1px solid #d0d4dc;border-radius:6px;font-size:14px;outline:none;}
.btn-login{width:100%;background:#8c8c8c;color:white;border:none;padding:12px;border-radius:6px;font-size:15px;cursor:pointer;font-weight:600;}
.role-cards{display:flex;flex-direction:column;gap:10px;margin-top:20px;}
.role-card{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid #e8eaed;border-radius:8px;cursor:pointer;transition:all 0.2s;}
.role-card:hover{border-color:#8c8c8c;background:#fbfbfc;}
.role-card .icon{font-size:22px;}
.role-card .info .name{font-weight:600;font-size:14px;color:#333;}
.role-card .info .desc{font-size:12px;color:#888;margin-top:2px;}
.footer{text-align:center;margin-top:20px;font-size:12px;color:#999;}
</style>
</head>
<body>
<div class="login-box">
  <div class="login-logo"><h1>SIDU-LATS</h1><p>缺陷识别数据存管系统 · 合规版</p><div class="role-badge">️ 查看者角色演示</div></div>
  <div class="demo-hint">️ 查看者（Viewer）<br>权限范围：仅数据查看，无审批、配置、签名等权限。适用于外部审查人员或客户参观。</div>
  <form onsubmit="handleLogin(event)">
    <div class="form-group"><label>用户名</label><input type="text" id="username" value="sunli"></div>
    <div class="form-group"><label>密码</label><input type="password" id="password" value="view1234"></div>
    <button type="submit" class="btn-login">以查看者身份登录</button>
  </form>
  <div class="role-cards">
    <div class="role-card" onclick="location.href='admin-login.html'"><div class="icon"></div><div class="info"><div class="name">切换：管理员</div><div class="desc">全权限</div></div></div>
    <div class="role-card" onclick="location.href='auditor-login.html'"><div class="icon"></div><div class="info"><div class="name">切换：审计员</div><div class="desc">审计审查</div></div></div>
    <div class="role-card" onclick="location.href='operator-login.html'"><div class="icon"></div><div class="info"><div class="name">切换：操作员</div><div class="desc">检测操作</div></div></div>
  </div>
  <div class="footer">© 2026 SIDU · FDA 21 CFR Part 11 · ALCOA+</div>
</div>
<script>
function handleLogin(e){e.preventDefault();sessionStorage.setItem('lats_logged_in','true');sessionStorage.setItem('lats_user',document.getElementById('username').value);sessionStorage.setItem('lats_role','viewer');sessionStorage.setItem('lats_role_name','查看者');location.href='viewer-dashboard.html';}
</script>
</body>
</html>
