<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIDU-LATS - 审批中心</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; }
.header { background: white; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); position: fixed; width: 100%; top: 0; z-index: 1000; height: 64px; }
.header-left { display: flex; align-items: center; gap: 24px; }
.logo { font-size: 20px; font-weight: 600; color: #1890ff; }
.breadcrumb { color: #666; font-size: 14px; }
.header-right { display: flex; align-items: center; gap: 16px; }
.layout-sider { position: fixed; left: 0; top: 64px; bottom: 0; width: 220px; background: white; box-shadow: 2px 0 8px rgba(0,0,0,0.06); z-index: 999; overflow-y: auto; }
.menu-item { padding: 14px 24px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #333; transition: all 0.2s; border-left: 3px solid transparent; font-size: 14px; }
.menu-item:hover { background: #f0f5ff; color: #1890ff; }
.menu-item.active { background: #e6f7ff; color: #1890ff; border-left-color: #1890ff; font-weight: 500; }
.main-content { margin-left: 220px; margin-top: 64px; padding: 24px; }
.page-title { font-size: 24px; font-weight: 600; color: #333; margin-bottom: 24px; }
.page-title span { font-size: 14px; color: #999; font-weight: 400; margin-left: 12px; }
.card { background: white; border-radius: 8px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 24px; }
.card-title { font-size: 16px; font-weight: 500; color: #333; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #f0f0f0; }
.btn-primary { background: #1890ff; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 14px; }
.btn-primary:hover { background: #40a9ff; }
.btn-success { background: #52c41a; color: white; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
.btn-danger { background: #ff4d4f; color: white; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
.btn-outline { padding: 4px 12px; border: 1px solid #d9d9d9; background: white; font-size: 12px; cursor: pointer; border-radius: 4px; }
.tag { padding: 2px 8px; border-radius: 4px; font-size: 12px; }
.tag-success { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
.tag-warning { background: #fffbe6; color: #faad14; border: 1px solid #ffe58f; }
.tag-error { background: #fff2f0; color: #ff4d4f; border: 1px solid #ffccc7; }
.tag-info { background: #e6f7ff; color: #1890ff; border: 1px solid #91d5ff; }
.hash-val { font-family: 'Monaco','Menlo',monospace; font-size: 12px; background: #f5f5f5; padding: 2px 6px; border-radius: 2px; }
table { width: 100%; border-collapse: collapse; }
thead tr { background: #fafafa; border-bottom: 1px solid #f0f0f0; }
th { padding: 12px; text-align: left; font-weight: 500; color: #333; font-size: 14px; }
td { padding: 12px; font-size: 13px; color: #333; border-bottom: 1px solid #f5f5f5; }
tbody tr:hover { background: #fafafa; }
.filter-bar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
.filter-bar select, .filter-bar input { padding: 6px 12px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px; outline: none; }
.filter-bar select:focus, .filter-bar input:focus { border-color: #1890ff; }
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 2000; }
.modal-box { background: white; border-radius: 8px; width: 520px; max-height: 80vh; overflow-y: auto; }
.modal-header { padding: 20px 24px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
.modal-header h3 { margin: 0; font-size: 18px; }
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #999; }
.modal-body { padding: 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid #f0f0f0; display: flex; gap: 12px; justify-content: flex-end; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; font-size: 14px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px; outline: none; resize: vertical; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #1890ff; }
.signature-panel { background: #f9f9f9; border: 1px solid #e8e8e8; border-radius: 6px; padding: 16px; margin-top: 16px; }
.signature-panel .label { font-size: 13px; color: #666; margin-bottom: 8px; }
.signature-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.signature-row .value { font-size: 13px; color: #333; }
</style>
</head>
<body>
<div class="header">
  <div class="header-left"><div class="logo">SIDU-LATS</div><div class="breadcrumb">审批中心 &raquo; 待处理审批请求</div></div>
  <div class="header-right">
    <div style="display:flex;align-items:center;gap:8px;"><span style="color:#666;font-size:14px;">操作员: 张明</span></div>
    <button onclick="location.href='index.html'" style="background:none;border:1px solid #d9d9d9;padding:6px 12px;border-radius:4px;cursor:pointer;color:#666;font-size:14px;">退出</button>
  </div>
</div>

<div class="layout-sider">
  <div class="menu-item" onclick="location.href='dashboard.html'">📊 仪表盘</div>
  <div class="menu-item" onclick="location.href='audit-log.html'">📋 审计日志</div>
  <div class="menu-item" onclick="location.href='hash-chain.html'">🔗 哈希链</div>
  <div class="menu-item active">✅ 审批中心</div>
  <div class="menu-item" onclick="location.href='user-management.html'">👤 用户管理</div>
  <div class="menu-item" onclick="location.href='storage.html'">💾 存储管理</div>
  <div class="menu-item" onclick="location.href='report-export.html'">📥 报告导出</div>
</div>

<div class="main-content">
  <div class="page-title">审批中心 <span>待处理审批请求</span></div>

  <div class="card">
    <div class="filter-bar">
      <select id="statusFilter"><option value="">全部状态</option><option value="待审批">待审批</option><option value="已批准">已批准</option><option value="已拒绝">已拒绝</option></select>
      <select id="typeFilter2"><option value="">全部类型</option><option value="配置变更">配置变更</option><option value="数据导出">数据导出</option><option value="签名授权">签名授权</option><option value="记录删除">记录删除</option></select>
      <input type="text" id="kwFilter2" placeholder="搜索关键词..." style="flex:1;max-width:200px;">
      <button class="btn-primary" onclick="filterApproval()">查询</button>
    </div>
    <table>
      <thead><tr><th>申请编号</th><th>申请人</th><th>类型</th><th>申请内容</th><th>申请时间</th><th>状态</th><th>操作</th></tr></thead>
      <tbody id="reqTable"></tbody>
    </table>
  </div>

  <div class="card">
    <div class="card-title">审批历史</div>
    <table>
      <thead><tr><th>申请编号</th><th>申请人</th><th>类型</th><th>审批人</th><th>审批时间</th><th>结果</th><th>签名</th></tr></thead>
      <tbody id="histTable"></tbody>
    </table>
  </div>
</div>

<!-- 签名弹窗 -->
<div id="signModal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <div class="modal-header">
      <h3>✍️ 电子签名确认</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <p style="margin-bottom:16px;color:#666;font-size:14px;">请确认以下审批内容，并选择签署意图：</p>
      <div style="background:#fafafa;padding:12px;border-radius:6px;margin-bottom:16px;font-size:14px;">
        <div id="signContent" style="color:#333;"></div>
      </div>
      <div class="form-group">
        <label>签署意图 *</label>
        <select id="signIntent" style="width:100%;padding:8px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:14px;">
          <option value="PREVIEW">初审 (PREVIEW)</option>
          <option value="REVIEW">复核 (REVIEW)</option>
          <option value="APPROVE">批准 (APPROVE)</option>
          <option value="REJECT">拒绝 (REJECT)</option>
        </select>
      </div>
      <div class="form-group">
        <label>签名密码 *</label>
        <input type="password" id="signPwd" placeholder="请输入签名密码" style="width:100%;padding:8px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:14px;">
      </div>
      <div class="signature-panel">
        <div class="label">签名凭证预览</div>
        <div class="signature-row"><span class="value">签名人:</span><span class="value" id="signerName">张明</span></div>
        <div class="signature-row"><span class="value">时间戳:</span><span class="value" id="signerTime">—</span></div>
        <div class="signature-row"><span class="value">签署意图:</span><span class="value" id="signerIntent">—</span></div>
        <div class="signature-row"><span class="value">签名哈希:</span><span class="value hash-val" id="signerHash">—</span></div>
      </div>
    </div>
    <div class="modal-footer">
      <button onclick="closeModal()" style="padding:8px 20px;border:1px solid #d9d9d9;border-radius:4px;background:white;cursor:pointer;">取消</button>
      <button onclick="confirmSign()" class="btn-primary" style="padding:8px 20px;">确认签名</button>
    </div>
  </div>
</div>

<script>
if (!sessionStorage.getItem('lats_logged_in')) { location.href = 'index.html'; }

var currentSignId = '';

var requests = [
  { id: 'APR-20260701-007', applicant: '李华', type: '配置变更', typeTag: 'warning', content: '修改检测阈值: 0.85→0.90', time: '2026-07-01 14:55:12', status: '待审批', statusTag: 'warning' },
  { id: 'APR-20260701-006', applicant: '王芳', type: '数据导出', typeTag: 'info', content: '导出2026年Q2审计报告', time: '2026-07-01 14:30:00', status: '待审批', statusTag: 'warning' },
  { id: 'APR-20260701-005', applicant: '张明', type: '签名授权', typeTag: 'info', content: '授权新用户数字签名权限', time: '2026-07-01 11:20:15', status: '待审批', statusTag: 'warning' },
  { id: 'APR-20260701-004', applicant: '李华', type: '记录删除', typeTag: 'error', content: '申请删除测试记录 (2026-06-15)', time: '2026-07-01 10:15:33', status: '待审批', statusTag: 'warning' }
];

var history = [
  { id: 'APR-20260701-003', applicant: '李华', type: '配置变更', typeTag: 'warning', approver: '张明', time: '2026-07-01 15:35:22', result: '已批准', resultTag: 'success', sig: 'sig-8f7e6d5c...' },
  { id: 'APR-20260701-002', applicant: '王芳', type: '数据导出', typeTag: 'info', approver: '张明', time: '2026-07-01 12:20:10', result: '已批准', resultTag: 'success', sig: 'sig-1a2b3c4d...' },
  { id: 'APR-20260701-001', applicant: '李华', type: '签名授权', typeTag: 'info', approver: '张明', time: '2026-07-01 09:15:45', result: '已批准', resultTag: 'success', sig: 'sig-9f8e7d6c...' }
];

function renderReq(data) {
  document.getElementById('reqTable').innerHTML = data.map(r => `
    <tr>
      <td style="color:#1890ff;font-weight:500;">${r.id}</td>
      <td>${r.applicant}</td>
      <td><span class="tag tag-${r.typeTag}">${r.type}</span></td>
      <td style="max-width:250px;">${r.content}</td>
      <td style="color:#666;font-size:13px;">${r.time}</td>
      <td><span class="tag tag-${r.statusTag}">${r.status}</span></td>
      <td>
        <button class="btn-success" onclick="openSign('${r.id}','${r.content}')">批准</button>
        <button class="btn-danger" onclick="rejectReq('${r.id}')">拒绝</button>
        <button class="btn-outline" onclick="showReqDetail('${r.id}')">详情</button>
      </td>
    </tr>
  `).join('');
}

document.getElementById('histTable').innerHTML = history.map(h => `
  <tr>
    <td style="color:#1890ff;">${h.id}</td><td>${h.applicant}</td>
    <td><span class="tag tag-${h.typeTag}">${h.type}</span></td>
    <td>${h.approver}</td>
    <td style="color:#666;font-size:13px;">${h.time}</td>
    <td><span class="tag tag-${h.resultTag}">${h.result}</span></td>
    <td><span class="hash-val">${h.sig}</span></td>
  </tr>
`).join('');

renderReq(requests);

function filterApproval() { alert('筛选功能演示'); }

function openSign(id, content) {
  currentSignId = id;
  document.getElementById('signContent').textContent = content;
  document.getElementById('signIntent').value = 'APPROVE';
  document.getElementById('signerTime').textContent = new Date().toLocaleString('zh-CN');
  document.getElementById('signerIntent').textContent = 'APPROVE';
  document.getElementById('signerHash').textContent = Math.random().toString(36).substring(2,14) + '...';
  document.getElementById('signModal').style.display = 'flex';
}

function closeModal() { document.getElementById('signModal').style.display = 'none'; }

function confirmSign() {
  var pwd = document.getElementById('signPwd').value;
  if (!pwd) { alert('请输入签名密码'); return; }
  alert('✓ 签名成功！\n\n签名人: 张明\n意图: ' + document.getElementById('signIntent').value + '\n时间: ' + new Date().toLocaleString('zh-CN'));
  closeModal();
}

function rejectReq(id) { alert('申请 ' + id + ' 已拒绝'); }
function showReqDetail(id) { alert('申请详情: ' + id); }

document.getElementById('signIntent').addEventListener('change', function() {
  document.getElementById('signerIntent').textContent = this.value;
});
</script>
</body>
</html>
