<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIDU-LATS - 报告导出</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; }
.header { background: white; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); position: fixed; width: 100%; top: 0; z-index: 1000; height: 64px; }
.header-left { display: flex; align-items: center; gap: 24px; }
.logo { font-size: 20px; font-weight: 600; color: #1890ff; }
.breadcrumb { color: #666; font-size: 14px; }
.header-right { display: flex; align-items: center; gap: 16px; }
.layout-sider { position: fixed; left: 0; top: 64px; bottom: 0; width: 220px; background: white; box-shadow: 2px 0 8px rgba(0,0,0,0.06); z-index: 999; overflow-y: auto; }
.menu-item { padding: 14px 24px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #333; transition: all 0.2s; border-left: 3px solid transparent; font-size: 14px; }
.menu-item:hover { background: #f0f5ff; color: #1890ff; }
.menu-item.active { background: #e6f7ff; color: #1890ff; border-left-color: #1890ff; font-weight: 500; }
.main-content { margin-left: 220px; margin-top: 64px; padding: 24px; }
.page-title { font-size: 24px; font-weight: 600; color: #333; margin-bottom: 24px; }
.page-title span { font-size: 14px; color: #999; font-weight: 400; margin-left: 12px; }
.card { background: white; border-radius: 8px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 24px; }
.card-title { font-size: 16px; font-weight: 500; color: #333; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #f0f0f0; }
.btn-primary { background: #1890ff; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 14px; }
.btn-primary:hover { background: #40a9ff; }
.tag { padding: 2px 8px; border-radius: 4px; font-size: 12px; }
.tag-success { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
.tag-info { background: #e6f7ff; color: #1890ff; border: 1px solid #91d5ff; }
.hash-val { font-family: 'Monaco','Menlo',monospace; font-size: 12px; background: #f5f5f5; padding: 2px 6px; border-radius: 2px; }
table { width: 100%; border-collapse: collapse; }
thead tr { background: #fafafa; border-bottom: 1px solid #f0f0f0; }
th { padding: 12px; text-align: left; font-weight: 500; color: #333; font-size: 14px; }
td { padding: 12px; font-size: 13px; color: #333; border-bottom: 1px solid #f5f5f5; }
.quick-actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.quick-action-item { display: flex; align-items: center; gap: 12px; padding: 16px; background: #f9f9f9; border-radius: 8px; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
.quick-action-item:hover { background: #e6f7ff; border-color: #91d5ff; }
.quick-action-item .icon { font-size: 24px; }
.quick-action-item .info .title { font-weight: 500; margin-bottom: 4px; }
.quick-action-item .info .desc { font-size: 12px; color: #999; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; font-size: 14px; }
.form-group input, .form-group select { width: 100%; padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px; outline: none; }
.form-group input:focus, .form-group select:focus { border-color: #1890ff; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.checkbox-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; cursor: pointer; }
.checkbox-row input { cursor: pointer; }
</style>
</head>
<body>
<div class="header">
  <div class="header-left"><div class="logo">SIDU-LATS</div><div class="breadcrumb">报告导出 &raquo; 合规报告生成与导出</div></div>
  <div class="header-right">
    <div style="display:flex;align-items:center;gap:8px;"><span style="color:#666;font-size:14px;">操作员: 张明</span></div>
    <button onclick="location.href='login.html'" style="background:none;border:1px solid #d9d9d9;padding:6px 12px;border-radius:4px;cursor:pointer;color:#666;font-size:14px;">退出</button>
  </div>
</div>

<div class="layout-sider">
  <div class="menu-item" onclick="location.href='dashboard.html'">📊 仪表盘</div>
  <div class="menu-item" onclick="location.href='audit-log.html'">📋 审计日志</div>
  <div class="menu-item" onclick="location.href='hash-chain.html'">🔗 哈希链</div>
  <div class="menu-item" onclick="location.href='approval.html'">✅ 审批中心</div>
  <div class="menu-item" onclick="location.href='user-management.html'">👤 用户管理</div>
  <div class="menu-item" onclick="location.href='storage.html'">💾 存储管理</div>
  <div class="menu-item active">📥 报告导出</div>
</div>

<div class="main-content">
  <div class="page-title">报告导出 <span>合规报告生成与导出</span></div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px;">
    <div class="card">
      <div class="card-title">导出类型</div>
      <div class="quick-actions">
        <div class="quick-action-item" onclick="selectType('audit')">
          <div class="icon">📊</div>
          <div class="info"><div class="title">审计报告</div><div class="desc">完整操作日志记录</div></div>
        </div>
        <div class="quick-action-item" onclick="selectType('hash')">
          <div class="icon">🔗</div>
          <div class="info"><div class="title">哈希验证报告</div><div class="desc">链完整性证明</div></div>
        </div>
        <div class="quick-action-item" onclick="selectType('signature')">
          <div class="icon">✍️</div>
          <div class="info"><div class="title">签名证书</div><div class="desc">数字签名记录</div></div>
        </div>
        <div class="quick-action-item" onclick="selectType('compliance')">
          <div class="icon">📋</div>
          <div class="info"><div class="title">合规摘要</div><div class="desc">FDA Part 11 合规证明</div></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">导出配置</div>
      <div>
        <div class="form-group">
          <label>报告类型</label>
          <select id="reportType">
            <option value="audit">审计报告</option>
            <option value="hash">哈希验证报告</option>
            <option value="signature">签名证书</option>
            <option value="compliance">合规摘要</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>开始日期</label>
            <input type="date" id="startDate" value="2026-06-01">
          </div>
          <div class="form-group">
            <label>结束日期</label>
            <input type="date" id="endDate" value="2026-07-01">
          </div>
        </div>
        <div class="form-group">
          <label>导出格式</label>
          <div style="display:flex;gap:16px;padding:8px 0;">
            <label class="checkbox-row"><input type="radio" name="format" value="pdf" checked> PDF</label>
            <label class="checkbox-row"><input type="radio" name="format" value="json"> JSON</label>
            <label class="checkbox-row"><input type="radio" name="format" value="csv"> CSV</label>
          </div>
        </div>
        <div class="form-group">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
            <input type="checkbox" id="inclHash" checked> 包含哈希校验值
          </label>
        </div>
        <div class="form-group">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
            <input type="checkbox" id="inclSig" checked> 包含数字签名
          </label>
        </div>
        <button class="btn-primary" style="width:100%;" onclick="generateReport()">生成报告</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">导出历史</div>
    <table>
      <thead><tr><th>报告ID</th><th>报告类型</th><th>时间范围</th><th>格式</th><th>生成人</th><th>生成时间</th><th>签名哈希</th><th>操作</th></tr></thead>
      <tbody id="historyTable"></tbody>
    </table>
  </div>
</div>

<script>
if (!sessionStorage.getItem('lats_logged_in')) { location.href = 'login.html'; }

var history = [
  { id: 'RPT-20260701-001', type: '审计报告', range: '2026-06-01 ~ 2026-07-01', format: 'pdf', creator: '张明', time: '2026-07-01 15:42', hash: 'a8f3c9d2...' },
  { id: 'RPT-20260628-003', type: '哈希验证报告', range: '2026-06-01 ~ 2026-06-28', format: 'pdf', creator: '王芳', time: '2026-06-28 16:30', hash: 'b9c4d5e6...' },
  { id: 'RPT-20260620-002', type: '合规摘要', range: '2026-Q1', format: 'pdf', creator: '张明', time: '2026-06-20 10:15', hash: 'c0d5e6f7...' },
  { id: 'RPT-20260615-001', type: '签名证书', range: '2026-06-15', format: 'json', creator: '李华', time: '2026-06-15 14:20', hash: 'd1e6f7a8...' }
];

document.getElementById('historyTable').innerHTML = history.map(h => `
  <tr>
    <td style="color:#1890ff;font-weight:500;">${h.id}</td>
    <td>${h.type}</td>
    <td style="color:#666;font-size:13px;">${h.range}</td>
    <td><span class="tag tag-info">${h.format.toUpperCase()}</span></td>
    <td>${h.creator}</td>
    <td style="color:#666;font-size:13px;">${h.time}</td>
    <td><span class="hash-val">${h.hash}</span></td>
    <td>
      <button style="background:none;border:none;color:#1890ff;cursor:pointer;font-size:13px;margin-right:8px;" onclick="downloadReport('${h.id}')">下载</button>
      <button style="background:none;border:none;color:#1890ff;cursor:pointer;font-size:13px;" onclick="verifyReport('${h.id}')">验证</button>
    </td>
  </tr>
`).join('');

function selectType(type) {
  document.getElementById('reportType').value = type;
}

function generateReport() {
  var type = document.getElementById('reportType').value;
  var fmt = document.querySelector('input[name="format"]:checked').value;
  var start = document.getElementById('startDate').value;
  var end = document.getElementById('endDate').value;
  var inclHash = document.getElementById('inclHash').checked;
  var inclSig = document.getElementById('inclSig').checked;
  var typeName = document.getElementById('reportType').options[document.getElementById('reportType').selectedIndex].text;
  alert('✓ 报告生成请求已提交！\n\n报告类型: ' + typeName + '\n格式: ' + fmt.toUpperCase() + '\n时间范围: ' + start + ' ~ ' + end + '\n包含哈希: ' + (inclHash ? '是' : '否') + '\n包含签名: ' + (inclSig ? '是' : '否') + '\n\n报告生成中，请稍候...');
}

function downloadReport(id) { alert('下载报告: ' + id + '\n\n（原型演示）'); }
function verifyReport(id) { alert('验证报告: ' + id + '\n\n✓ 哈希验证通过\n✓ 签名验证通过\n✓ 合规性验证通过'); }
</script>
</body>
</html>
