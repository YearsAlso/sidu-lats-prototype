<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIDU-LATS - 用户管理</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f5f7; }
.header { background: white; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 2px rgba(15,23,42,0.04); position: fixed; width: 100%; top: 0; z-index: 1000; height: 64px; }
.header-left { display: flex; align-items: center; gap: 24px; }
.logo { font-size: 20px; font-weight: 600; color: #1f3a5f; }
.breadcrumb { color: #5a6373; font-size: 14px; }
.header-right { display: flex; align-items: center; gap: 16px; }
.layout-sider { position: fixed; left: 0; top: 64px; bottom: 0; width: 220px; background: white; box-shadow: 1px 0 0 rgba(15,23,42,0.04); z-index: 999; overflow-y: auto; }
.menu-item { padding: 14px 24px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #1f2937; transition: all 0.2s; border-left: 3px solid transparent; font-size: 14px; }
.menu-item:hover { background: #e6edf5; color: #1f3a5f; }
.menu-item.active { background: #e6edf5; color: #1f3a5f; border-left-color: #1f3a5f; font-weight: 500; }
.main-content { margin-left: 220px; margin-top: 64px; padding: 24px; }
.page-title { font-size: 24px; font-weight: 600; color: #1f2937; margin-bottom: 24px; }
.page-title span { font-size: 14px; color: #8a93a3; font-weight: 400; margin-left: 12px; }
.card { background: white; border-radius: 6px; padding: 24px; box-shadow: 0 1px 2px rgba(15,23,42,0.04); margin-bottom: 24px; }
.card-title { font-size: 16px; font-weight: 500; color: #1f2937; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #e8eaed; }
.btn-primary { background: #1f3a5f; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 14px; }
.btn-primary:hover { background: #2d5483; }
.tag { padding: 2px 8px; border-radius: 4px; font-size: 12px; }
.tag-success { background: #e8f3ec; color: #0f7b3a; border: 1px solid #9bccaf; }
.tag-warning { background: #faf2e0; color: #a36404; border: 1px solid #e6c890; }
.tag-error { background: #f7e7e5; color: #b3261e; border: 1px solid #d9a8a3; }
.tag-info { background: #e6edf5; color: #1f3a5f; border: 1px solid #a8b8cf; }
table { width: 100%; border-collapse: collapse; }
thead tr { background: #fbfbfc; border-bottom: 1px solid #e8eaed; }
th { padding: 12px; text-align: left; font-weight: 500; color: #1f2937; font-size: 14px; }
td { padding: 12px; font-size: 13px; color: #1f2937; border-bottom: 1px solid #f0f2f5; }
tbody tr:hover { background: #fbfbfc; }
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 2000; }
.modal-box { background: white; border-radius: 6px; width: 500px; max-height: 80vh; overflow-y: auto; }
.modal-header { padding: 20px 24px; border-bottom: 1px solid #e8eaed; display: flex; justify-content: space-between; align-items: center; }
.modal-header h3 { margin: 0; font-size: 18px; }
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #8a93a3; }
.modal-body { padding: 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid #e8eaed; display: flex; gap: 12px; justify-content: flex-end; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; margin-bottom: 8px; color: #1f2937; font-weight: 500; font-size: 14px; }
.form-group input, .form-group select { width: 100%; padding: 8px 12px; border: 1px solid #d0d4dc; border-radius: 4px; font-size: 14px; outline: none; }
.form-group input:focus, .form-group select:focus { border-color: #1f3a5f; }
.toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.filter-bar { display: flex; gap: 12px; align-items: center; }
.filter-bar input, .filter-bar select { padding: 6px 12px; border: 1px solid #d0d4dc; border-radius: 4px; font-size: 14px; outline: none; }
</style>
</head>
<body>
<div class="header">
  <div class="header-left"><div class="logo">SIDU-LATS</div><div class="breadcrumb">用户管理 &raquo; 系统用户与权限配置</div></div>
  <div class="header-right">
    <div style="display:flex;align-items:center;gap:8px;"><span style="color:#5a6373;font-size:14px;">当前用户 / 张明</span></div>
    <button onclick="location.href='index.html'" style="background:none;border:1px solid #d0d4dc;padding:6px 12px;border-radius:4px;cursor:pointer;color:#5a6373;font-size:14px;">注销</button>
  </div>
</div>

<div class="layout-sider">
  <div class="menu-item" onclick="location.href='dashboard.html'">📊 仪表盘</div>
  <div class="menu-item" onclick="location.href='audit-log.html'">📋 审计日志</div>
  <div class="menu-item" onclick="location.href='hash-chain.html'">🔗 哈希链</div>
  <div class="menu-item" onclick="location.href='approval.html'">✅ 审批中心</div>
  <div class="menu-item active">👤 用户管理</div>
  <div class="menu-item" onclick="location.href='storage.html'">💾 存储管理</div>
  <div class="menu-item" onclick="location.href='report-export.html'">📥 报告导出</div>
<div class="menu-item" onclick="location.href='personal-center.html'">👤 个人中心</div>
</div>

<div class="main-content">
  <div class="page-title">用户管理 <span>系统用户与权限配置</span></div>

  <div class="toolbar">
    <div class="filter-bar">
      <input type="text" id="kwInput" placeholder="搜索用户名/姓名..." style="width:200px;">
      <select id="roleFilter"><option value="">全部角色</option><option>管理员</option><option>审核人员</option><option>QA审计员</option><option>操作员</option></select>
      <select id="statusFilter"><option value="">全部状态</option><option>启用</option><option>禁用</option></select>
    </div>
    <button class="btn-primary" onclick="openAddUser()">+ 添加用户</button>
  </div>

  <div class="card">
    <table>
      <thead><tr><th>用户名</th><th>姓名</th><th>角色</th><th>部门</th><th>邮箱</th><th>最后登录</th><th>状态</th><th>操作</th></tr></thead>
      <tbody id="userTable"></tbody>
    </table>
    <div style="margin-top:16px;display:flex;justify-content:space-between;align-items:center;">
      <span style="color:#5a6373;font-size:14px;">共 5 条记录</span>
      <div style="display:flex;gap:8px;">
        <button style="padding:6px 12px;border:1px solid #d0d4dc;border-radius:4px;background:#e6edf5;color:#1f3a5f;border-color:#a8b8cf;">1</button>
        <button style="padding:6px 12px;border:1px solid #d0d4dc;border-radius:4px;background:white;">2</button>
      </div>
    </div>
  </div>
</div>

<!-- 添加用户弹窗 -->
<div id="addUserModal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <div class="modal-header"><h3>添加用户</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-group"><label>用户名 *</label><input type="text" id="newUsername" placeholder="请输入用户名"></div>
      <div class="form-group"><label>姓名 *</label><input type="text" id="newName" placeholder="请输入姓名"></div>
      <div class="form-group"><label>角色 *</label>
        <select id="newRole"><option>管理员</option><option>审核人员</option><option>QA审计员</option><option>操作员</option></select>
      </div>
      <div class="form-group"><label>部门</label><input type="text" id="newDept" placeholder="请输入部门"></div>
      <div class="form-group"><label>邮箱 *</label><input type="email" id="newEmail" placeholder="请输入邮箱"></div>
      <div class="form-group"><label>初始密码 *</label><input type="password" id="newPwd" placeholder="请输入初始密码"></div>
      <div class="form-group"><label>账号有效期</label><input type="date" id="newExpiry"></div>
    </div>
    <div class="modal-footer">
      <button onclick="closeModal()" style="padding:8px 20px;border:1px solid #d0d4dc;border-radius:4px;background:white;cursor:pointer;">取消</button>
      <button onclick="addUser()" class="btn-primary" style="padding:8px 20px;">确定</button>
    </div>
  </div>
</div>

<script>
if (!sessionStorage.getItem('lats_logged_in')) { location.href = 'index.html'; }

var users = [
  { username: 'zhangming', name: '张明', role: '管理员', roleTag: 'error', dept: '质量管理部', email: 'zhangming@sidu.com', lastLogin: '2026-07-01 15:42', status: '启用', statusTag: 'success' },
  { username: 'lihua', name: '李华', role: '操作员', roleTag: 'info', dept: '生产部', email: 'lihua@sidu.com', lastLogin: '2026-07-01 15:35', status: '启用', statusTag: 'success' },
  { username: 'wangfang', name: '王芳', role: 'QA审计员', roleTag: 'warning', dept: '合规部', email: 'wangfang@sidu.com', lastLogin: '2026-07-01 15:15', status: '启用', statusTag: 'success' },
  { username: 'zhaoyong', name: '赵勇', role: '操作员', roleTag: 'info', dept: '生产部', email: 'zhaoyong@sidu.com', lastLogin: '2026-06-30 18:20', status: '启用', statusTag: 'success' },
  { username: 'sunli', name: '孙丽', role: '操作员', roleTag: 'info', dept: '市场部', email: 'sunli@sidu.com', lastLogin: '2026-06-28 10:30', status: '禁用', statusTag: 'error' }
];

function renderUsers(data) {
  document.getElementById('userTable').innerHTML = data.map(u => `
    <tr>
      <td style="color:#1f3a5f;font-weight:500;">${u.username}</td>
      <td>${u.name}</td>
      <td><span class="tag tag-${u.roleTag}">${u.role}</span></td>
      <td style="color:#5a6373;">${u.dept}</td>
      <td style="color:#5a6373;">${u.email}</td>
      <td style="color:#5a6373;font-size:13px;">${u.lastLogin}</td>
      <td><span class="tag tag-${u.statusTag}">${u.status}</span></td>
      <td>
        <button onclick="editUser('${u.username}')" style="background:none;border:none;color:#1f3a5f;cursor:pointer;font-size:13px;margin-right:8px;">编辑</button>
        <button onclick="toggleStatus('${u.username}')" style="background:none;border:none;color:#b3261e;cursor:pointer;font-size:13px;">${u.status === '启用' ? '禁用' : '启用'}</button>
      </td>
    </tr>
  `).join('');
}

renderUsers(users);

function openAddUser() { document.getElementById('addUserModal').style.display = 'flex'; }
function closeModal() { document.getElementById('addUserModal').style.display = 'none'; }

function addUser() {
  var u = document.getElementById('newUsername').value.trim();
  var n = document.getElementById('newName').value.trim();
  var p = document.getElementById('newPwd').value;
  if (!u || !n || !p) { alert('请填写必填项'); return; }
  alert('✓ 用户 ' + n + ' 添加成功！\n\n初始密码已生成，请告知用户首次登录后修改。');
  closeModal();
}

function editUser(username) { alert('编辑用户: ' + username + '\n\n（原型演示）'); }
function toggleStatus(username) { alert('用户 ' + username + ' 状态已切换'); }
</script>
</body>
</html>
