<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIDU-LATS - 登录</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji'; }
  .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f5f5f5; }
  .login-box { background: white; padding: 40px; border-radius: 4px; box-shadow: 0 1px 0 rgba(0,0,0,0.03); width: 420px; }
  .login-logo { text-align: center; margin-bottom: 32px; }
  .login-logo h1 { color: #1677ff; font-size: 32px; margin-bottom: 8px; letter-spacing: 2px; }
  .login-logo p { color: rgba(0,0,0,0.65); font-size: 14px; }
  .fda-badge { display: inline-block; background: #e6f4ff; color: #1677ff; font-size: 12px; padding: 4px 12px; border-radius: 4px; margin-top: 12px; border: 1px solid #91caff; }
  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; margin-bottom: 8px; color: rgba(0,0,0,0.88); font-weight: 500; font-size: 14px; }
  .form-group input { width: 100%; padding: 10px 14px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; transition: border-color 0.2s; outline: none; }
  .form-group input:focus { border-color: #1677ff; box-shadow: 0 0 0 2px rgba(22,119,255,0.1); }
  .remember-row { display: flex; align-items: center; margin-bottom: 24px; }
  .remember-row input { margin-right: 8px; cursor: pointer; }
  .remember-row label { color: rgba(0,0,0,0.65); font-size: 14px; cursor: pointer; }
  .btn-primary { width: 100%; padding: 12px; background: #1677ff; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
  .btn-primary:hover { background: #4096ff; }
  .btn-primary:active { background: #0958d9; }
  .login-footer { margin-top: 28px; text-align: center; color: rgba(0,0,0,0.45); font-size: 12px; }
  .login-footer p { margin-bottom: 4px; }
  .error-msg { color: #ff4d4f; font-size: 13px; margin-bottom: 12px; text-align: center; display: none; }
  .error-msg.show { display: block; }
  .back-link { text-align: center; margin-top: 16px; }
  .back-link a { color: #1677ff; text-decoration: none; font-size: 13px; }
  .back-link a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="login-container">
  <div class="login-box">
    <div class="login-logo">
      <h1>SIDU-LATS</h1>
      <p>FDA合规数据管理系统</p>
      <span class="fda-badge"> FDA 21 CFR Part 11 合规</span>
    </div>

    <div id="errorMsg" class="error-msg"></div>

    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="username" placeholder="请输入用户名" autocomplete="username">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
    </div>

    <div class="remember-row">
      <input type="checkbox" id="remember">
      <label for="remember">记住登录状态</label>
    </div>

    <button class="btn-primary" id="loginBtn">登 录</button>

    <div class="login-footer">
      <p>系统版本: v2.4.1 &nbsp;|&nbsp; 构建日期: 2026-06-28</p>
      <p>© 2026 SIDU Technology. 保留所有权利.</p>
    </div>

    <div class="back-link">
      <a href="dashboard.html">→ 直接进入系统（原型演示用）</a>
    </div>
  </div>
</div>

<script>
document.getElementById('loginBtn').addEventListener('click', function() {
  var u = document.getElementById('username').value.trim();
  var p = document.getElementById('password').value.trim();
  var err = document.getElementById('errorMsg');

  if (!u || !p) {
    err.textContent = '请输入用户名和密码';
    err.classList.add('show');
    return;
  }

  // 模拟登录成功，写入 localStorage 标记已登录
  sessionStorage.setItem('lats_logged_in', '1');
  sessionStorage.setItem('lats_user', u);
  err.classList.remove('show');
  window.location.href = 'dashboard.html';
});
</script>
</body>
</html>
